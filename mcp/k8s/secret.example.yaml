# Do not commit this file with real values filled in.
# Create it directly instead, e.g.:
#   kubectl create secret generic daily-brief-mcp-secrets `
#     --from-literal=DAILY_BRIEF_API_BASE_URL=https://dashboard.es-sandbox.com/daily-brief `
#     -n daily-brief
#
# No per-user token or shared secret lives here anymore — each person supplies
# their OWN daily-brief API token as their Claude connector's Authorization
# header, and this server forwards it through untouched. See README.md's
# "Auth model" section.
apiVersion: v1
kind: Secret
metadata:
  name: daily-brief-mcp-secrets
  namespace: daily-brief
type: Opaque
stringData:
  DAILY_BRIEF_API_BASE_URL: "REPLACE_ME"
