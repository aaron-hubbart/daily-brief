# Do not commit this file with real values filled in.
# Create it directly instead, e.g.:
#   kubectl create secret generic daily-brief-mcp-secrets `
#     --from-literal=DAILY_BRIEF_API_BASE_URL=https://dashboard.es-sandbox.com/daily-brief `
#     --from-literal=DAILY_BRIEF_API_TOKEN=<token from the Drive JSON file> `
#     --from-literal=MCP_SHARED_SECRET=<a long random string you also paste into Claude's static header config> `
#     -n daily-brief
apiVersion: v1
kind: Secret
metadata:
  name: daily-brief-mcp-secrets
  namespace: daily-brief
type: Opaque
stringData:
  DAILY_BRIEF_API_BASE_URL: "REPLACE_ME"
  DAILY_BRIEF_API_TOKEN: "REPLACE_ME"
  MCP_SHARED_SECRET: "REPLACE_ME"
