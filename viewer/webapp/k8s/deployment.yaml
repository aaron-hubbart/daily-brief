apiVersion: apps/v1
kind: Deployment
metadata:
  name: daily-brief-viewer
  namespace: daily-brief
  labels:
    app: daily-brief-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: daily-brief-viewer
  template:
    metadata:
      labels:
        app: daily-brief-viewer
    spec:
      containers:
        - name: daily-brief-viewer
          image: gcr.io/tam-aaron-hubbart/daily-brief-viewer:latest
          ports:
            - containerPort: 8000
          env:
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: daily-brief-secrets
                  key: FLASK_SECRET_KEY
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: daily-brief-secrets
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: daily-brief-secrets
                  key: AZURE_CLIENT_SECRET
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: daily-brief-secrets
                  key: AZURE_TENANT_ID
            # Plain value, not a secret — matches the dashboard app's own
            # pattern of keeping the redirect URI as a visible env value.
            # Includes the /daily-brief prefix this app is mounted at (see
            # ingress.yaml) — must exactly match the Redirect URI registered
            # on the app registration in the Azure Portal.
            - name: AZURE_REDIRECT_URI
              value: "https://dashboard.es-sandbox.com/daily-brief/auth/callback"
            # Plain value, not a secret (just an allowlist of email
            # addresses) — comma-separated emails allowed to reach /admin.
            # Unset (empty) disables the admin panel entirely. Edit this
            # value directly and re-apply/rollout-restart to change it;
            # not worth a Secret for something this low-sensitivity.
            - name: ADMIN_EMAILS
              value: ""
            # Built from postgres-credentials via $(VAR) interpolation
            # (supported natively by Kubernetes for env vars defined earlier
            # in the same list) rather than duplicating the connection
            # string as a second secret that could drift out of sync with
            # the StatefulSet's own credentials.
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
