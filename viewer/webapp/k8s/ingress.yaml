apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: daily-brief-viewer
  namespace: daily-brief
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Strip the /daily-brief prefix before it reaches the app — app.py's
    # routes are defined at root (/login, /healthz, etc.), not under a
    # prefix. $2 is the part of the path after /daily-brief.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # ProxyFix in app.py reads this to know the external prefix when
    # generating redirect/callback URLs (url_for, the OAuth redirect_uri) —
    # without it, the app would build correct-looking URLs that are missing
    # /daily-brief and would 404 through this same Ingress.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Prefix /daily-brief;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dashboard.es-sandbox.com
      # Separate secret from the dashboard app's dashboard-tls — Secrets are
      # namespace-scoped, so this namespace needs (and cert-manager will
      # independently issue) its own certificate for the same hostname.
      # Two certs for one domain across namespaces is a normal pattern here,
      # not a conflict.
      secretName: daily-brief-tls
  rules:
    - host: dashboard.es-sandbox.com
      http:
        paths:
          - path: /daily-brief(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: daily-brief-viewer
                port:
                  number: 8000
