# DO NOT commit real values. Use the kubectl command in DEPLOYMENT.md instead
# of applying this file directly. This is a reference for what keys exist.
#
# This is the single source of truth for the DB credentials — both the
# Postgres StatefulSet and the app Deployment read from this same secret
# (the app builds DATABASE_URL from these three via $(VAR) interpolation in
# its env, rather than duplicating the connection string in a second
# secret that could drift out of sync).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: daily-brief
type: Opaque
stringData:
  POSTGRES_USER: "dailybrief"
  POSTGRES_PASSWORD: "REPLACE-generate-a-real-password"
  POSTGRES_DB: "dailybrief"
