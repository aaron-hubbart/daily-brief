apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: daily-brief
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              # postgres refuses to initialize directly into a mount point
              # that already has other files at its root (lost+found, etc.
              # on some volume types) — a subdirectory avoids that.
              subPath: pgdata
            - name: postgres-schema
              # Files here are only auto-executed by the postgres image on
              # first init of an empty data directory — this does NOT
              # re-run schema.sql on every pod restart, only the very first
              # time. Schema changes later need a manual migration step,
              # not a re-apply of this ConfigMap.
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: postgres-schema
          configMap:
            name: postgres-schema
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 5Gi
