apiVersion: v1
kind: ConfigMap
metadata:
  name: daily-brief-proxy-headers
  namespace: daily-brief
data:
  # Read by app.py's ProxyFix (x_prefix=1) to know the external path prefix
  # when generating redirect/callback URLs (url_for, the OAuth redirect_uri).
  # Without this, the app would build correct-looking URLs missing
  # /daily-brief, which would 404 through this same Ingress.
  X-Forwarded-Prefix: "/daily-brief"
