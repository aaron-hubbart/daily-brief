# DO NOT commit real values. Use the kubectl command in ../DEPLOYMENT.md
# instead of applying this file directly. This is a reference for what
# keys exist.
apiVersion: v1
kind: Secret
metadata:
  name: daily-brief-secrets
  namespace: daily-brief
type: Opaque
stringData:
  FLASK_SECRET_KEY: "REPLACE-32-bytes-hex"
  AZURE_CLIENT_ID: "REPLACE"
  AZURE_CLIENT_SECRET: "REPLACE"
  AZURE_TENANT_ID: "REPLACE"
  # No UPLOAD_TOKENS here anymore — each person's API token is assigned
  # automatically in Postgres the first time they sign in through the
  # browser (db.get_or_create_user), and they retrieve it themselves via
  # GET /api/token. See db/README.md and DEPLOYMENT.md.
  # No ASANA_PAT here either as of migrations/003_add_asana_pat.sql —
  # each person's Asana token is entered through the setup walkthrough or
  # Account panel and stored per-user in the users table, not as a single
  # deployment-wide secret.
